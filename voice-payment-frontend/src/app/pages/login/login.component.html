<div class="login-wrapper">
  <div class="login-card">
    <h2>Voice Login</h2>
    <p class="subtitle">Secure access with your voice</p>

    <button mat-raised-button color="primary" class="voice-btn" (click)="startLogin()">
      <mat-icon>mic</mat-icon> Login Using Voice
    </button>

    <div class="divider">
      <span>or</span>
    </div>

    <button mat-stroked-button color="accent" (click)="goRegister()">
      New User? Register
    </button>
  </div>
</div>
